<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Endpoint — Webhook Monitor</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        surface: { DEFAULT: "#0A0A0B", raised: "#111113", overlay: "#18181B", hover: "#1F1F23" },
        border: { DEFAULT: "#27272A", subtle: "#1C1C1F" },
        ink: { DEFAULT: "#FAFAFA", muted: "#A1A1AA", faint: "#71717A" },
        accent: { DEFAULT: "#3B82F6", hover: "#60A5FA", dim: "#1D4ED8", subtle: "rgba(59,130,246,0.1)" },
        status: { up: "#22C55E", "up-dim": "rgba(34,197,94,0.12)", down: "#EF4444", "down-dim": "rgba(239,68,68,0.12)", degraded: "#F59E0B", "degraded-dim": "rgba(245,158,11,0.12)", unknown: "#71717A", "unknown-dim": "rgba(113,113,122,0.12)" },
      },
      fontFamily: { sans: ["Inter", "sans-serif"], mono: ["JetBrains Mono", "monospace"] },
    },
  },
};
</script>
<link rel="stylesheet" href="/base.css" />
</head>
<body class="min-h-screen bg-surface text-ink antialiased">

<div id="shell-topbar-mobile"></div>

<div class="flex">
  <div id="shell-sidebar-wrapper" class="fixed inset-y-0 left-0 z-40 w-60 -translate-x-full border-r border-border bg-surface-raised transition-transform duration-200 lg:translate-x-0">
    <div id="shell-sidebar" class="h-full"></div>
  </div>

  <div class="flex min-h-screen w-full flex-col lg:pl-60">

    <header class="border-b border-border px-4 py-4 sm:px-6 lg:px-8 lg:py-5">
      <a href="endpoints.html" class="mb-2 inline-flex items-center gap-1 text-xs font-medium text-ink-faint hover:text-ink-muted transition-colors">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M10 3L5 8l5 5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        All endpoints
      </a>
      <div class="flex flex-wrap items-start justify-between gap-3">
        <div id="header-info">
          <div class="skeleton h-6 w-48 rounded mb-2"></div>
          <div class="skeleton h-4 w-64 rounded"></div>
        </div>
        <div class="flex gap-2">
          <button id="check-now-btn" class="flex items-center gap-1.5 rounded-sm border border-border px-3 py-1.5 text-sm font-medium text-ink-muted hover:bg-surface-hover hover:text-ink transition-colors">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true"><path d="M8 1L8 3M8 13v2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M1 8h2M13 8h2M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4"/></svg>
            Check now
          </button>
        </div>
      </div>
    </header>

    <div class="border-b border-border px-4 sm:px-6 lg:px-8">
      <nav class="flex gap-5 overflow-x-auto" role="tablist" aria-label="Endpoint sections">
        <button data-tab="health" role="tab" aria-selected="true" class="tab-btn whitespace-nowrap border-b-2 border-accent px-1 py-3 text-sm font-medium text-ink">Health</button>
        <button data-tab="events" role="tab" aria-selected="false" class="tab-btn whitespace-nowrap border-b-2 border-transparent px-1 py-3 text-sm font-medium text-ink-faint hover:text-ink-muted">Events</button>
        <button data-tab="diagnoses" role="tab" aria-selected="false" class="tab-btn whitespace-nowrap border-b-2 border-transparent px-1 py-3 text-sm font-medium text-ink-faint hover:text-ink-muted">AI diagnoses</button>
        <button data-tab="alerts" role="tab" aria-selected="false" class="tab-btn whitespace-nowrap border-b-2 border-transparent px-1 py-3 text-sm font-medium text-ink-faint hover:text-ink-muted">Alerts</button>
      </nav>
    </div>

    <main class="flex-1 px-4 py-5 sm:px-6 lg:px-8 lg:py-6">

      <section id="panel-health" role="tabpanel" aria-labelledby="health">
        <div id="status-banner" class="mb-5 flex items-center gap-4 rounded-lg border border-border bg-surface-raised p-5">
          <div class="skeleton h-10 w-10 rounded-full"></div>
          <div class="flex-1"><div class="skeleton h-4 w-32 rounded mb-2"></div><div class="skeleton h-3 w-48 rounded"></div></div>
        </div>

        <div class="mb-5 grid grid-cols-2 gap-3 sm:grid-cols-4" id="metric-cards"></div>

        <div class="overflow-hidden rounded-lg border border-border bg-surface-raised">
          <div class="border-b border-border px-5 py-4">
            <h2 class="text-sm font-semibold text-ink">Recent checks</h2>
          </div>
          <ul id="checks-list" class="divide-y divide-border-subtle"></ul>
        </div>
      </section>

      <section id="panel-events" role="tabpanel" aria-labelledby="events" class="hidden">
        <div class="overflow-hidden rounded-lg border border-border bg-surface-raised">
          <ul id="events-list" class="divide-y divide-border-subtle"></ul>
        </div>
      </section>

      <section id="panel-diagnoses" role="tabpanel" aria-labelledby="diagnoses" class="hidden">
        <div id="diagnoses-list" class="space-y-3"></div>
      </section>

      <section id="panel-alerts" role="tabpanel" aria-labelledby="alerts" class="hidden">
        <div class="mb-5 rounded-lg border border-border bg-surface-raised p-5">
          <h2 class="mb-3 text-sm font-semibold text-ink">Notification preferences</h2>
          <div class="flex items-center justify-between py-2">
            <div>
              <p class="text-sm text-ink">Slack alerts</p>
              <p class="text-xs text-ink-faint">Notify your Slack channel when this endpoint goes down</p>
            </div>
            <button id="toggle-slack" role="switch" aria-checked="false" aria-label="Toggle Slack alerts" class="relative h-5 w-9 rounded-full bg-surface-hover transition-colors">
              <span class="absolute left-0.5 top-0.5 h-4 w-4 rounded-full bg-ink-faint transition-transform"></span>
            </button>
          </div>
          <div class="flex items-center justify-between border-t border-border-subtle py-2 pt-3">
            <div>
              <p class="text-sm text-ink">Email alerts</p>
              <p class="text-xs text-ink-faint">Send an email when this endpoint goes down</p>
            </div>
            <button id="toggle-email" role="switch" aria-checked="false" aria-label="Toggle email alerts" class="relative h-5 w-9 rounded-full bg-surface-hover transition-colors">
              <span class="absolute left-0.5 top-0.5 h-4 w-4 rounded-full bg-ink-faint transition-transform"></span>
            </button>
          </div>
        </div>

        <div class="overflow-hidden rounded-lg border border-border bg-surface-raised">
          <div class="border-b border-border px-5 py-4">
            <h2 class="text-sm font-semibold text-ink">Alert history</h2>
          </div>
          <ul id="alerts-list" class="divide-y divide-border-subtle"></ul>
        </div>
      </section>

    </main>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/shell.js"></script>
<script>
const endpointId = new URLSearchParams(location.search).get("id");
let currentEndpoint = null;

(async function init() {
  if (!endpointId) {
    window.location.href = "endpoints.html";
    return;
  }
  const ok = await Shell.mount({ active: "endpoints" });
  if (!ok) return;

  setupTabs();
  document.getElementById("check-now-btn").addEventListener("click", checkNow);

  await loadHeader();
  await loadHealthTab();
})();

function setupTabs() {
  document.querySelectorAll(".tab-btn").forEach((btn) => {
    btn.addEventListener("click", () => switchTab(btn.dataset.tab));
  });
}

let loadedTabs = new Set(["health"]);

function switchTab(tab) {
  document.querySelectorAll(".tab-btn").forEach((btn) => {
    const active = btn.dataset.tab === tab;
    btn.setAttribute("aria-selected", String(active));
    btn.classList.toggle("border-accent", active);
    btn.classList.toggle("text-ink", active);
    btn.classList.toggle("border-transparent", !active);
    btn.classList.toggle("text-ink-faint", !active);
  });
  ["health", "events", "diagnoses", "alerts"].forEach((t) => {
    document.getElementById(`panel-${t}`).classList.toggle("hidden", t !== tab);
  });

  if (!loadedTabs.has(tab)) {
    loadedTabs.add(tab);
    if (tab === "events") loadEventsTab();
    if (tab === "diagnoses") loadDiagnosesTab();
    if (tab === "alerts") loadAlertsTab();
  }
}

async function loadHeader() {
  try {
    const { endpoint } = await Api.getEndpoint(endpointId);
    currentEndpoint = endpoint;
    document.getElementById("header-info").innerHTML = `
      <h1 class="text-xl font-semibold text-ink">${escapeHtml(endpoint.name)}</h1>
      <p class="mt-0.5 font-mono text-sm text-ink-faint">${escapeHtml(endpoint.url)}</p>`;
  } catch (err) {
    Toast.show(err.message || "Could not load endpoint.", "error");
  }
}

async function checkNow() {
  const btn = document.getElementById("check-now-btn");
  btn.disabled = true;
  const originalHtml = btn.innerHTML;
  btn.innerHTML = '<svg class="h-3.5 w-3.5 animate-spin" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="2" opacity="0.25"/><path d="M14.5 8a6.5 6.5 0 00-6.5-6.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Checking…';
  try {
    const { result } = await Api.checkNow(endpointId);
    Toast.show(`Check complete — ${result.status.toUpperCase()}${result.response_time_ms != null ? `, ${result.response_time_ms}ms` : ""}`, result.status === "up" ? "success" : "error");
    await loadHealthTab();
  } catch (err) {
    Toast.show(err.message || "Check failed.", "error");
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalHtml;
  }
}

async function loadHealthTab() {
  try {
    const data = await Api.endpointHealth(endpointId);
    renderStatusBanner(data.health, data.cdn);
    renderMetricCards(data.health);
    renderChecks(data.recent_checks);
  } catch (err) {
    Toast.show(err.message || "Could not load health data.", "error");
  }
}

function renderStatusBanner(health, cdn) {
  const toneMap = { up: "border-status-up bg-status-up-dim", down: "border-status-down bg-status-down-dim", degraded: "border-status-degraded bg-status-degraded-dim" };
  const tone = toneMap[health.current_status] || "border-border bg-surface-raised";
  const labelMap = { up: "Operational", down: "Down", degraded: "Degraded", never_checked: "Not yet checked" };
  const label = labelMap[health.current_status] || "Unknown";

  document.getElementById("status-banner").className = `mb-5 flex items-center gap-4 rounded-lg border p-5 ${tone}`;
  document.getElementById("status-banner").innerHTML = `
    <div class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-full bg-surface-raised">
      ${statusIcon(health.current_status)}
    </div>
    <div class="flex-1">
      <p class="text-base font-semibold text-ink">${label}</p>
      <p class="text-sm text-ink-faint">${health.last_checked ? `Last checked ${formatRelativeTime(health.last_checked)}` : "No checks recorded yet"}${cdn && cdn.detected ? ` · Served via ${escapeHtml(cdn.provider)}` : ""}</p>
    </div>`;
}

function statusIcon(status) {
  if (status === "up") return '<svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" class="text-status-up"><path d="M3 8.5l3.5 3.5L13 5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  if (status === "down") return '<svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" class="text-status-down"><path d="M4 4l8 8M12 4l-8 8" stroke-linecap="round"/></svg>';
  if (status === "degraded") return '<svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" class="text-status-degraded"><path d="M8 5v4M8 11.5v.01" stroke-linecap="round"/></svg>';
  return '<svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" class="text-status-unknown"><circle cx="8" cy="8" r="6"/></svg>';
}

function renderMetricCards(health) {
  const cards = [
    { label: "Uptime", value: health.uptime_percentage != null ? `${health.uptime_percentage}%` : "—" },
    { label: "Avg response", value: health.avg_response_ms != null ? `${health.avg_response_ms}ms` : "—" },
    { label: "Consecutive failures", value: health.consecutive_failures != null ? health.consecutive_failures : 0 },
    { label: "Last status code", value: health.last_status_code != null ? health.last_status_code : "—" },
  ];
  document.getElementById("metric-cards").innerHTML = cards
    .map((c) => `
      <div class="rounded-lg border border-border bg-surface-raised p-4">
        <p class="mb-2 text-xs font-medium uppercase tracking-wide text-ink-faint">${c.label}</p>
        <p class="text-xl font-semibold text-ink font-mono">${c.value}</p>
      </div>`)
    .join("");
}

function renderChecks(checks) {
  const list = document.getElementById("checks-list");
  if (!checks || checks.length === 0) {
    list.innerHTML = '<li class="px-5 py-10 text-center text-sm text-ink-faint">No health checks recorded yet — the first check runs within 60 seconds.</li>';
    return;
  }
  const dotMap = { up: "bg-status-up", down: "bg-status-down", degraded: "bg-status-degraded" };
  list.innerHTML = checks
    .map((c) => `
      <li class="flex items-center gap-3 px-5 py-3.5">
        <span class="h-2 w-2 flex-shrink-0 rounded-full ${dotMap[c.status] || "bg-status-unknown"}"></span>
        <div class="min-w-0 flex-1">
          <p class="text-sm text-ink">${c.status.toUpperCase()}${c.error_message ? ` — ${escapeHtml(c.error_message)}` : ""}</p>
          ${c.cdn_detected ? `<p class="text-xs text-accent">Served via ${escapeHtml(c.cdn_provider)}</p>` : ""}
        </div>
        <div class="text-right">
          <p class="font-mono text-sm text-ink-muted">${c.response_time_ms != null ? `${c.response_time_ms}ms` : "—"}</p>
          <p class="text-xs text-ink-faint">${formatRelativeTime(c.checked_at)}</p>
        </div>
      </li>`)
    .join("");
}

async function loadEventsTab() {
  const list = document.getElementById("events-list");
  list.innerHTML = skeletonListItems(4);
  try {
    const { events } = await Api.endpointEvents(endpointId);
    if (!events || events.length === 0) {
      list.innerHTML = `<li>${emptyStateBlock("No events yet", "Webhook events sent to this endpoint will appear here.")}</li>`;
      return;
    }
    const badgeMap = { received: "bg-accent-subtle text-accent", delivered: "bg-status-up-dim text-status-up", failed: "bg-status-down-dim text-status-down", retrying: "bg-status-degraded-dim text-status-degraded" };
    list.innerHTML = events
      .map((ev) => {
        const badge = badgeMap[ev.delivery_status || ev.status] || "bg-surface-hover text-ink-faint";
        return `
        <li class="flex items-start justify-between gap-3 px-5 py-3.5">
          <div class="min-w-0 flex-1">
            <p class="text-sm text-ink">${escapeHtml(ev.readable || ev.event_type || "Webhook event")}</p>
            ${ev.ai_summary ? `<p class="mt-0.5 text-xs text-ink-faint italic">${escapeHtml(ev.ai_summary)}</p>` : ""}
            <p class="mt-1 text-xs text-ink-faint">${formatRelativeTime(ev.received_at)}</p>
          </div>
          <span class="flex-shrink-0 rounded-full px-2 py-0.5 text-xs font-medium ${badge}">${escapeHtml(ev.delivery_status || ev.status || "received")}</span>
        </li>`;
      })
      .join("");
  } catch (err) {
    Toast.show(err.message || "Could not load events.", "error");
  }
}

async function loadDiagnosesTab() {
  const container = document.getElementById("diagnoses-list");
  container.innerHTML = skeletonListItems(2);
  try {
    const { diagnoses } = await Api.endpointDiagnoses(endpointId);
    if (!diagnoses || diagnoses.length === 0) {
      container.innerHTML = emptyStateBlock("No AI diagnoses yet", "When this endpoint fails repeatedly, an AI-generated diagnosis with a suggested fix will appear here.");
      return;
    }
    const severityTone = { low: "border-l-status-unknown", medium: "border-l-status-degraded", high: "border-l-status-down", critical: "border-l-status-down" };
    container.innerHTML = diagnoses
      .map((d) => `
      <div class="rounded-lg border border-border border-l-2 ${severityTone[d.severity] || "border-l-border"} bg-surface-raised p-4">
        <div class="mb-2 flex items-center justify-between">
          <span class="rounded-full border border-border px-2 py-0.5 text-xs font-medium uppercase tracking-wide text-ink-faint">${escapeHtml(d.source)}</span>
          <span class="text-xs text-ink-faint">${formatRelativeTime(d.created_at)}</span>
        </div>
        <p class="mb-2 text-sm text-ink">${escapeHtml(d.likely_cause)}</p>
        <p class="text-sm text-ink-muted"><span class="font-medium text-ink-faint">Suggested fix —</span> ${escapeHtml(d.suggested_fix)}</p>
        ${d.code_hint ? `<pre class="mt-2 overflow-x-auto rounded-sm bg-surface px-3 py-2 font-mono text-xs text-ink-muted">${escapeHtml(d.code_hint)}</pre>` : ""}
      </div>`)
      .join("");
  } catch (err) {
    Toast.show(err.message || "Could not load AI diagnoses.", "error");
  }
}

async function loadAlertsTab() {
  try {
    const prefs = currentEndpoint || {};
    setToggle("toggle-slack", prefs.slack_alerts_enabled !== false);
    setToggle("toggle-email", prefs.email_alerts_enabled !== false);

    document.getElementById("toggle-slack").addEventListener("click", () => toggleAlertPref("toggle-slack", "slack_alerts_enabled"));
    document.getElementById("toggle-email").addEventListener("click", () => toggleAlertPref("toggle-email", "email_alerts_enabled"));

    const list = document.getElementById("alerts-list");
    list.innerHTML = skeletonListItems(2);
    const { alerts } = await Api.endpointAlerts(endpointId);
    if (!alerts || alerts.length === 0) {
      list.innerHTML = `<li>${emptyStateBlock("No alerts yet", "That's a good sign — alerts fire after 3 consecutive failed health checks.")}</li>`;
      return;
    }
    list.innerHTML = alerts
      .map((a) => `
      <li class="flex items-start gap-3 px-5 py-3.5">
        <span class="mt-1 h-2 w-2 flex-shrink-0 rounded-full ${a.alert_type === "recovered" ? "bg-status-up" : "bg-status-down"}"></span>
        <div class="flex-1">
          <p class="text-sm text-ink">${escapeHtml(a.message)}</p>
          <p class="mt-0.5 text-xs text-ink-faint">${formatRelativeTime(a.sent_at)}</p>
        </div>
      </li>`)
      .join("");
  } catch (err) {
    Toast.show(err.message || "Could not load alerts.", "error");
  }
}

function setToggle(id, isOn) {
  const btn = document.getElementById(id);
  btn.setAttribute("aria-checked", String(isOn));
  btn.classList.toggle("bg-accent", isOn);
  btn.classList.toggle("bg-surface-hover", !isOn);
  const dot = btn.querySelector("span");
  dot.classList.toggle("translate-x-4", isOn);
  dot.classList.toggle("bg-white", isOn);
  dot.classList.toggle("bg-ink-faint", !isOn);
}

async function toggleAlertPref(toggleId, prefKey) {
  const btn = document.getElementById(toggleId);
  const newValue = btn.getAttribute("aria-checked") !== "true";
  setToggle(toggleId, newValue);
  try {
    await Api.updateAlertPrefs(endpointId, { [prefKey]: newValue });
    Toast.show(`${prefKey === "slack_alerts_enabled" ? "Slack" : "Email"} alerts ${newValue ? "enabled" : "disabled"}.`, "success");
  } catch (err) {
    setToggle(toggleId, !newValue);
    Toast.show(err.message || "Could not update preference.", "error");
  }
}

function skeletonListItems(count) {
  return Array.from({ length: count }).map(() => '<li class="flex items-center gap-3 px-5 py-3.5"><div class="skeleton h-2 w-2 rounded-full"></div><div class="flex-1"><div class="skeleton h-3.5 w-2/3 rounded mb-2"></div><div class="skeleton h-3 w-1/3 rounded"></div></div></li>').join("");
}

function emptyStateBlock(title, body) {
  return `<div class="flex flex-col items-center justify-center px-6 py-14 text-center">
    <p class="text-sm font-medium text-ink mb-1">${escapeHtml(title)}</p>
    <p class="text-sm text-ink-faint max-w-sm">${escapeHtml(body)}</p>
  </div>`;
}
</script>
</body>
</html>
