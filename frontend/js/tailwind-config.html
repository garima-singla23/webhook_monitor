<!--
  js/tailwind-config.html
  ─────────────────────────────────────────────
  NOT loaded via <script src>  — Tailwind's CDN build requires
  the config to be inline in each page's <head> before the
  utility classes are generated, so this isn't includable at
  runtime the way the JS modules are.

  This file exists as the single source of truth to COPY from.
  It must stay byte-for-byte identical to the inline block in
  every page (index.html, dashboard.html, endpoints.html,
  endpoint_detail.html, settings.html) and to tailwind.config.js.
  If you change a token, update all 6 places.
-->
