<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings — Webhook Monitor</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        surface: { DEFAULT: "#0A0A0B", raised: "#111113", overlay: "#18181B", hover: "#1F1F23" },
        border: { DEFAULT: "#27272A", subtle: "#1C1C1F" },
        ink: { DEFAULT: "#FAFAFA", muted: "#A1A1AA", faint: "#71717A" },
        accent: { DEFAULT: "#3B82F6", hover: "#60A5FA", dim: "#1D4ED8", subtle: "rgba(59,130,246,0.1)" },
        status: { up: "#22C55E", "up-dim": "rgba(34,197,94,0.12)", down: "#EF4444", "down-dim": "rgba(239,68,68,0.12)", degraded: "#F59E0B", "degraded-dim": "rgba(245,158,11,0.12)", unknown: "#71717A", "unknown-dim": "rgba(113,113,122,0.12)" },
      },
      fontFamily: { sans: ["Inter", "sans-serif"], mono: ["JetBrains Mono", "monospace"] },
    },
  },
};
</script>
<link rel="stylesheet" href="/static/base.css" />
</head>
<body class="min-h-screen bg-surface text-ink antialiased">

<div id="shell-topbar-mobile"></div>

<div class="flex">
  <div id="shell-sidebar-wrapper" class="fixed inset-y-0 left-0 z-40 w-60 -translate-x-full border-r border-border bg-surface-raised transition-transform duration-200 lg:translate-x-0">
    <div id="shell-sidebar" class="h-full"></div>
  </div>

  <div class="flex min-h-screen w-full flex-col lg:pl-60">

    <header class="hidden border-b border-border px-8 py-5 lg:block">
      <h1 class="text-xl font-semibold text-ink">Settings</h1>
      <p class="mt-0.5 text-sm text-ink-faint">Account and system information</p>
    </header>
    <div class="px-4 py-4 sm:px-6 lg:hidden">
      <h1 class="text-lg font-semibold text-ink">Settings</h1>
    </div>

    <main class="flex-1 px-4 py-5 sm:px-6 lg:px-8 lg:py-6 max-w-2xl">

      <section class="mb-6 rounded-lg border border-border bg-surface-raised p-5">
        <h2 class="mb-4 text-sm font-semibold text-ink">Account</h2>
        <dl class="space-y-3">
          <div class="flex items-center justify-between">
            <dt class="text-sm text-ink-faint">Email</dt>
            <dd id="account-email" class="text-sm font-medium text-ink"><span class="skeleton inline-block h-3.5 w-40 rounded"></span></dd>
          </div>
          <div class="flex items-center justify-between">
            <dt class="text-sm text-ink-faint">User ID</dt>
            <dd id="account-id" class="font-mono text-xs text-ink-muted"><span class="skeleton inline-block h-3.5 w-32 rounded"></span></dd>
          </div>
        </dl>
      </section>

      <section class="mb-6 rounded-lg border border-border bg-surface-raised p-5">
        <h2 class="mb-4 text-sm font-semibold text-ink">System status</h2>
        <dl class="space-y-3" id="system-status">
          <div class="flex items-center justify-between">
            <dt class="text-sm text-ink-faint">API</dt>
            <dd><span class="skeleton inline-block h-3.5 w-16 rounded"></span></dd>
          </div>
        </dl>
      </section>

      <section class="rounded-lg border border-status-down/30 bg-surface-raised p-5">
        <h2 class="mb-1 text-sm font-semibold text-status-down">Danger zone</h2>
        <p class="mb-4 text-sm text-ink-faint">Log out of Webhook Monitor on this device.</p>
        <button id="logout-btn" class="rounded-sm border border-status-down/40 px-3.5 py-2 text-sm font-medium text-status-down transition-colors hover:bg-status-down/10">
          Log out
        </button>
      </section>

    </main>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/ui.js"></script>
<script src="/static/js/shell.js"></script>
<script>
(async function init() {
  const ok = await Shell.mount({ active: "settings" });
  if (!ok) return;

  try {
    const { user } = await Api.me();
    document.getElementById("account-email").textContent = user.email;
    document.getElementById("account-id").textContent = user.id;
  } catch (err) {
    Toast.show(err.message || "Could not load account info.", "error");
  }

  try {
    const health = await Api.systemHealth();
    document.getElementById("system-status").innerHTML = `
      <div class="flex items-center justify-between">
        <dt class="text-sm text-ink-faint">API</dt>
        <dd>${statusBadge(health.status === "ok" ? "up" : "down")}</dd>
      </div>
      <div class="flex items-center justify-between border-t border-border-subtle pt-3">
        <dt class="text-sm text-ink-faint">Background scheduler</dt>
        <dd>${statusBadge(health.scheduler && health.scheduler.running ? "up" : "down")}</dd>
      </div>
      <div class="flex items-center justify-between border-t border-border-subtle pt-3">
        <dt class="text-sm text-ink-faint">Redis queue</dt>
        <dd>${statusBadge(health.redis && health.redis.connected ? "up" : "down")}</dd>
      </div>
      <div class="flex items-center justify-between border-t border-border-subtle pt-3">
        <dt class="text-sm text-ink-faint">Slack alerts</dt>
        <dd class="text-sm text-ink-muted">${health.alerting && health.alerting.slack_configured ? "Configured" : "Not configured"}</dd>
      </div>
      <div class="flex items-center justify-between border-t border-border-subtle pt-3">
        <dt class="text-sm text-ink-faint">Email alerts</dt>
        <dd class="text-sm text-ink-muted">${health.alerting && health.alerting.email_configured ? "Configured" : "Not configured"}</dd>
      </div>`;
  } catch (err) {
    document.getElementById("system-status").innerHTML = `<p class="text-sm text-status-down">Could not reach the API.</p>`;
  }

  document.getElementById("logout-btn").addEventListener("click", () => {
    Modal.open({
      title: "Log out",
      bodyHtml: "<p>You'll need to log back in to view your endpoints.</p>",
      confirmLabel: "Log out",
      danger: true,
      onConfirm: async () => {
        Auth.clearToken();
        window.location.href = "index.html";
      },
    });
  });
})();
</script>
</body>
</html>
